<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cre8tive Sync</title>
    <!--
      SPA fallback for static hosts (GitHub Pages / custom domain).
      Deep links like /portfolio/oxilia hit this 404 page; we encode the
      requested path into a query string and redirect to the app root, where
      the snippet in index.html restores the real URL before React Router runs.
      pathSegmentsToKeep = 0 because the site is served from the domain root.
    -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
